version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: app-backend
    env_file:
      - ./backend/.env
    environment:
      MONGO_URL: ${MONGO_URL:-}
      DB_NAME: ${DB_NAME:-}
    # Usa exclusivamente variáveis do arquivo backend/.env para evitar sobrescrever com vazio
    ports:
      - "8001:8001"
    volumes:
      - ./:/app
      - ./data/ml:/data/ml
    restart: unless-stopped

  # Treinador semanal (loop) - roda continuamente e treina 1x por semana
  ml_trainer:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: app-ml-trainer
    command: ["python", "ml_trainer.py"]
    env_file:
      - ./backend/.env
    environment:
      - TRAIN_SYMBOL=${TRAIN_SYMBOL:-R_100}
      - TRAIN_TIMEFRAME=${TRAIN_TIMEFRAME:-3m}
      - TRAIN_HORIZON=${TRAIN_HORIZON:-3}
      - TRAIN_THRESHOLD=${TRAIN_THRESHOLD:-0.003}
      - TRAIN_MODEL_TYPE=${TRAIN_MODEL_TYPE:-rf}
    volumes:
      - ./:/app
      - ./data/ml:/data/ml
    depends_on:
      - backend
    restart: unless-stopped

  # Disparo manual de treino único (encerra após concluir)
  ml_train_once:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: app-ml-train-once
    command: ["python", "ml_trainer.py"]
    env_file:
      - ./backend/.env
    environment:
      - TRAIN_RUN_ONCE=1
      - TRAIN_SYMBOL=${TRAIN_SYMBOL:-R_100}
      - TRAIN_TIMEFRAME=${TRAIN_TIMEFRAME:-3m}
      - TRAIN_HORIZON=${TRAIN_HORIZON:-3}
      - TRAIN_THRESHOLD=${TRAIN_THRESHOLD:-0.003}
      - TRAIN_MODEL_TYPE=${TRAIN_MODEL_TYPE:-rf}
    volumes:
      - ./:/app
      - ./data/ml:/data/ml
    profiles: ["manual"]

  # Seed inicial de candles (uma vez) chamando o endpoint do backend
  seed_candles:
    image: curlimages/curl:8.10.1
    container_name: app-seed-candles
    depends_on:
      - backend
    command: ["sh", "-c", "sleep 10 && curl -s -X POST 'http://backend:8001/api/candles/ingest?symbol=${SEED_SYMBOL:-R_100}&granularity=${SEED_GRANULARITY:-60}&count=${SEED_COUNT:-2000}' && echo 'Seed done'"]
    profiles: ["manual"]

networks:
  default:
    name: app-net